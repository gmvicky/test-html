<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Open in App</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    .open-app-btn {
      display: inline-block;
      padding: 14px 24px;
      background: #007bff;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
    }

    .open-app-btn:active {
      background: #0056b3;
    }
  </style>
      <script> 

        window.onload = function () { 

            const isAndroidPhone = /android.*mobile/i.test(navigator.userAgent);
            const isiOSPhone = /iPhone/i.test(navigator.userAgent);
            const isMobilePhone = isAndroidPhone || isiOSPhone

            if (isMobilePhone) {

              const inputUrl = "https://simplygo.com.sg/simplygo-app?deeplink-path=uma-app/travel-guide/bus-stop&code=15051&utm_source=test&utm_medium=test&utm_campaign=testmel";
              const urlObj = new URL(inputUrl);

                // const params = new URLSearchParams(window.location.search);
                const params = new URLSearchParams(urlObj.search);
                const deeplinkPath = params.get("deeplink-path") || ""; ////

                if (deeplinkPath.length > 0) {
                    // const urlScheme = "sg.com.transitlink://"

                    // // 4. Remove the deeplink-path so it doesn't double up
                    // params.delete("deeplink-path");

                    // // 5. Build the query string from remaining params
                    // const remainingParams = params.toString();
                    // const queryString = remainingParams ? `?${remainingParams}` : "";

                    // // 6. Reconstruct the final deep link
                    // const url = urlScheme + `${urlObj.hostname}/` + deeplinkPath + queryString;

                    //  const urlObj = new URL(window.location.href);
                    const urlScheme = "sg.com.transitlink://"
                    const url = urlScheme + `${urlObj.hostname}/` + deeplinkPath;


                      setTimeout(function () { 
                        
                        window.location.href = url;
                    }, 1000); 
                
                    document.addEventListener('visibilitychange', function() {
                        if (document.visibilityState === 'visible') {
                            window.location.href = url;
                        } 
                    });
                }
            }
        }; 
    </script> 
</head>

<body>
  <div class="container">
    <a
      href="sg.com.transitlink://simplygobff.ezlink.com.sg/uma-app/ewallet/detail111"
      class="open-app-btn"
    >
      Open in App1
    </a>
  </div>
</body>
</html>
